<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>忘記密碼 — 統一認證入口</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="card">
    <h1>🔑 忘記密碼</h1>
    <p class="subtitle">透過安全問題重設密碼</p>

    <div id="msg" class="message"></div>

    <!-- Step 1: Enter username -->
    <form id="step1Form">
      <div class="form-group">
        <label for="username">用戶名</label>
        <input type="text" id="username" placeholder="輸入你的用戶名" autocomplete="username" required />
      </div>
      <button type="submit" class="btn btn-primary">下一步</button>
    </form>

    <!-- Step 2: Answer security question & set new password -->
    <form id="step2Form" style="display:none;">
      <div class="form-group">
        <label>安全問題</label>
        <p id="securityQuestionText" class="security-question-display"></p>
      </div>
      <div class="form-group">
        <label for="securityAnswer">你的答案</label>
        <input type="text" id="securityAnswer" placeholder="輸入安全問題的答案" required />
      </div>
      <div class="form-group">
        <label for="newPassword">新密碼</label>
        <input type="password" id="newPassword" placeholder="至少 6 個字元" autocomplete="new-password" required />
      </div>
      <div class="form-group">
        <label for="newPassword2">確認新密碼</label>
        <input type="password" id="newPassword2" placeholder="再次輸入新密碼" autocomplete="new-password" required />
      </div>
      <button type="submit" class="btn btn-primary">重設密碼</button>
    </form>

    <div class="link-row">
      <a href="/">← 返回登入</a>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    let forgotUsername = "";

    document.getElementById("step1Form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      forgotUsername = username;
      await forgotPasswordVerify(username);
    });

    document.getElementById("step2Form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const answer = document.getElementById("securityAnswer").value.trim();
      const newPassword = document.getElementById("newPassword").value;
      const newPassword2 = document.getElementById("newPassword2").value;
      await forgotPasswordReset(forgotUsername, answer, newPassword, newPassword2);
    });
  </script>
</body>
</html>
